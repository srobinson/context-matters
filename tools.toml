[tools.cx_get]
cli_name        = "get"
mcp_description = "Fetch full content for specific entry IDs. Phase 2 of two-phase retrieval. Use after cx_recall or cx_browse to load full body content. Accepts full hyphenated UUIDv7 strings only. IDs that do not exist are silently omitted. Maximum 100 IDs per request."
cli_about       = "Fetch full entry content by ID.\n\nReturns complete entries including body. Use after cx_recall or cx_browse for full content."
# JSON Schema mirrors the structured shape that `crates/cm-capabilities/src/projection/get_view.rs::format_get_view`
# renders to YAML today. `WebGetView` itself is not yet a Rust type — the §3 parity pass only produced
# `WebBrowseView` and `WebRecallView`. This schema documents the byte-for-byte shape ALP-1760 must produce
# when it wires `structuredContent` for cx_get; the sibling sub-issue is expected to introduce the struct.
# Optional row fields (`tags`, `confidence`) follow the same `skip_serializing_if` convention as
# `cm_core::EntryMeta`.
output_schema   = '''
{
  "type": "object",
  "description": "Get response: request/found counts, missing ids, and full entries.",
  "required": ["requested", "found"],
  "properties": {
    "requested": {"type": "integer", "minimum": 0, "description": "Number of ids the caller supplied."},
    "found": {"type": "integer", "minimum": 0, "description": "Number of entries successfully resolved from the store."},
    "missing": {
      "type": "array",
      "description": "Ids the caller supplied that did not resolve. Omitted when empty.",
      "items": {"type": "string", "description": "Verbatim id the caller passed; not guaranteed to be a valid UUID."}
    },
    "entries": {
      "type": "array",
      "description": "Resolved entries with full body. Omitted when empty. Order mirrors the caller's request.",
      "items": {
        "type": "object",
        "required": ["id", "title", "scope", "kind", "age", "body"],
        "properties": {
          "id": {"type": "string", "format": "uuid", "description": "Full UUID v7."},
          "title": {"type": "string"},
          "scope": {"type": "string", "description": "Canonical scope path."},
          "kind": {"type": "string", "enum": ["fact", "decision", "preference", "lesson", "reference", "feedback", "pattern", "observation"]},
          "tags": {"type": "array", "items": {"type": "string"}, "description": "Entry tags. Omitted when `meta.tags` is empty."},
          "confidence": {"type": "string", "enum": ["high", "medium", "low"], "description": "Entry confidence level. Omitted when `meta.confidence` is unset."},
          "age": {"type": "string", "description": "Relative age string (e.g. \"2h\", \"6d\")."},
          "body": {"type": "string", "description": "Full markdown body."}
        }
      }
    }
  }
}
'''

[[tools.cx_get.params]]
name            = "ids"
type            = "array"
items_type      = "string"
required        = true
mcp_description = "Entry IDs: full hyphenated UUIDv7 strings. Max 100 per request."
cli_help        = "Entry IDs to retrieve (full hyphenated UUIDv7, space-separated, max 100)"
cli_flag        = "ids"

[tools.cx_update]
cli_name        = "update"
mcp_description = "Partially update an existing entry. Only provided fields are modified. Changing body or kind recomputes content_hash and checks for duplicates. Scope migration is excluded; use cx_store with supersedes to move entries across scopes. At least one field must be provided."
cli_about       = "Partially update an entry.\n\nOnly provided fields are modified. Changing body recomputes the content hash."

[[tools.cx_update.params]]
name            = "id"
type            = "string"
required        = true
mcp_description = "ID of the entry to update."
cli_help        = "Entry ID to update"
cli_flag        = "id"

[[tools.cx_update.params]]
name            = "title"
type            = "string"
mcp_description = "New title. Omit to keep existing."
cli_help        = "New title (omit to keep existing)"
cli_flag        = "--title"

[[tools.cx_update.params]]
name            = "body"
type            = "string"
mcp_description = "New body content in markdown. Changing body recomputes content_hash and checks for duplicates. Omit to keep existing."
cli_help        = "New body content (omit to keep existing). Recomputes content hash"
cli_flag        = "--body"

[[tools.cx_update.params]]
name            = "kind"
type            = "string"
enum            = ["fact", "decision", "preference", "lesson", "reference", "feedback", "pattern", "observation"]
mcp_description = "New kind classification. Changing kind recomputes content_hash. Omit to keep existing."
cli_help        = "New kind (omit to keep existing). Recomputes content hash"
cli_flag        = "--kind"

[[tools.cx_update.params]]
name            = "meta"
type            = "object"
mcp_description = "Replace metadata entirely. Provide the complete desired meta object with fields: tags (array), confidence (high/medium/low), source (string), expires_at (ISO 8601), priority (integer). Omit to keep existing metadata."
cli_help        = "Replace metadata (JSON object with tags, confidence, source, expires_at, priority)"
cli_flag        = "--meta"

[tools.cx_forget]
cli_name        = "forget"
mcp_description = "Soft-delete entries by marking them as forgotten. Sets superseded_by to the entry's own ID, distinguishing forgotten entries from entries superseded by a replacement. Already-inactive entries are silently skipped. Maximum 100 IDs per request. Partial success is reported."
cli_about       = "Soft-delete entries.\n\nMarks entries as forgotten (sets superseded_by to own ID). Already-inactive entries are skipped."

[[tools.cx_forget.params]]
name            = "ids"
type            = "array"
items_type      = "string"
required        = true
mcp_description = "Entry IDs to forget. Maximum 100 per request. Each ID is processed independently."
cli_help        = "Entry IDs to forget (space-separated, max 100)"
cli_flag        = "ids"

[tools.cx_stats]
cli_name        = "stats"
mcp_description = "View aggregate statistics about the context store. Returns active/superseded entry counts, scope count, relation count, breakdown by kind, by scope, and by tag, database file size, and scope tree. Diagnostic tool for understanding what context exists."
cli_about       = "Show store statistics.\n\nDisplays entry counts by kind, scope, and tag, relation count, database size, and scope tree."
# JSON Schema documents the structured shape the stats projection will expose via
# `structuredContent` once ALP-1760 wires dual-channel. `WebStatsView` is not yet a Rust type —
# today `crates/cm-capabilities/src/projection/stats_view.rs::format_stats_view` takes a
# `cm_capabilities::stats::StatsResult` (which wraps `cm_core::StoreStats` + a `Vec<ScopeTreeNode>`)
# and renders YAML directly. The fields below are a flattened projection of `StatsResult` +
# `StoreStats` (dropping the redundant `entries_by_scope` map that `scope_tree` already carries).
output_schema   = '''
{
  "type": "object",
  "description": "Stats response: store totals, per-kind histogram, top tags, and scope tree.",
  "required": ["active", "superseded", "scopes", "relations", "db_size_bytes", "kinds", "top_tags", "scope_tree"],
  "properties": {
    "active": {"type": "integer", "minimum": 0, "description": "Number of active (non-superseded) entries."},
    "superseded": {"type": "integer", "minimum": 0, "description": "Number of superseded (soft-deleted or replaced) entries."},
    "scopes": {"type": "integer", "minimum": 0, "description": "Total scopes in the store."},
    "relations": {"type": "integer", "minimum": 0, "description": "Total relations in the store."},
    "db_size_bytes": {"type": "integer", "minimum": 0, "description": "SQLite database file size in bytes."},
    "kinds": {
      "type": "object",
      "additionalProperties": {"type": "integer", "minimum": 0},
      "description": "Per-kind entry counts across active entries."
    },
    "top_tags": {
      "type": "array",
      "description": "Most frequent tags, capped at 10 by `TOP_TAGS_LIMIT`.",
      "items": {
        "type": "object",
        "required": ["tag", "count"],
        "properties": {
          "tag": {"type": "string"},
          "count": {"type": "integer", "minimum": 0}
        }
      }
    },
    "scope_tree": {
      "type": "array",
      "description": "Scope tree rows in traversal order.",
      "items": {
        "type": "object",
        "required": ["path", "kind", "label", "entry_count"],
        "properties": {
          "path": {"type": "string", "description": "Canonical scope path."},
          "kind": {"type": "string", "description": "ScopeKind serialised as a string (global, project, repo, session)."},
          "label": {"type": "string", "description": "Human-readable label for the scope."},
          "entry_count": {"type": "integer", "minimum": 0, "description": "Active entries at this scope (non-recursive)."}
        }
      }
    }
  }
}
'''

[[tools.cx_stats.params]]
name            = "tag_sort"
type            = "string"
enum            = ["name", "count"]
mcp_description = "Sort order for tag breakdown. 'name': alphabetical ascending (default). 'count': most used tags first."
cli_help        = "Tag sort order: name (alphabetical, default) or count (most used first)"
cli_flag        = "--tag-sort"

[tools.cx_export]
cli_name        = "export"
mcp_description = "Export entries and scopes as JSON for backup or migration. Returns all active entries (superseded excluded) and their scopes. Relations are excluded in v1. Optionally filter with a scope selector."
cli_about       = "Export entries and scopes as JSON.\n\nExports all active entries and scopes. Use --scope to filter with an exact path or cwd_inferred."
# JSON Schema matches the current ad-hoc JSON envelope emitted by
# `crates/cm-cli/src/mcp/tools/export.rs`. Unlike the other read tools, cx_export already
# returns structured JSON (not YAML) because the JSON *is* the canonical output.
# `entries[]` and `scopes[]` follow the `cm_core::Entry` and `cm_core::Scope` serde layouts;
# optional fields (`meta`, `superseded_by`, `parent_path`) use `skip_serializing_if = Option::is_none`.
# The nested shapes are documented inline rather than linked out, so external clients can
# validate the payload without chasing Rust source.
output_schema   = '''
{
  "type": "object",
  "description": "Export response: full entry and scope snapshots plus provenance metadata.",
  "required": ["entries", "scopes", "exported_at", "count"],
  "properties": {
    "count": {"type": "integer", "minimum": 0, "description": "Length of `entries`."},
    "exported_at": {"type": "string", "format": "date-time", "description": "Export timestamp in RFC 3339."},
    "entries": {
      "type": "array",
      "description": "Active entries in the export scope. Mirrors `cm_core::Entry`.",
      "items": {
        "type": "object",
        "required": ["id", "scope_path", "kind", "title", "body", "content_hash", "created_by", "created_at", "updated_at"],
        "properties": {
          "id": {"type": "string", "format": "uuid"},
          "scope_path": {"type": "string", "description": "Canonical scope path."},
          "kind": {"type": "string", "enum": ["fact", "decision", "preference", "lesson", "reference", "feedback", "pattern", "observation"]},
          "title": {"type": "string"},
          "body": {"type": "string", "description": "Full markdown body."},
          "content_hash": {"type": "string", "description": "BLAKE3 hex digest of the body."},
          "meta": {
            "type": "object",
            "description": "Optional metadata envelope. Omitted when every sub-field is empty.",
            "properties": {
              "tags": {"type": "array", "items": {"type": "string"}},
              "confidence": {"type": "string", "enum": ["high", "medium", "low"]},
              "source": {"type": "string"},
              "expires_at": {"type": "string", "format": "date-time"},
              "priority": {"type": "integer"}
            },
            "additionalProperties": true
          },
          "created_by": {"type": "string", "description": "Attribution string (e.g. agent:claude-code)."},
          "created_at": {"type": "string", "format": "date-time"},
          "updated_at": {"type": "string", "format": "date-time"},
          "superseded_by": {"type": "string", "format": "uuid", "description": "Id of the replacement entry when this row is soft-deleted."}
        }
      }
    },
    "scopes": {
      "type": "array",
      "description": "Scopes touched by the export. Mirrors `cm_core::Scope`.",
      "items": {
        "type": "object",
        "required": ["path", "kind", "label", "created_at"],
        "properties": {
          "path": {"type": "string"},
          "kind": {"type": "string", "description": "ScopeKind serialised as a string."},
          "label": {"type": "string"},
          "parent_path": {"type": "string", "description": "Parent scope path. Omitted for the root scope."},
          "meta": {"type": "object", "description": "Free-form scope metadata. Omitted when unset.", "additionalProperties": true},
          "created_at": {"type": "string", "format": "date-time"}
        }
      }
    }
  }
}
'''

[[tools.cx_export.params]]
name            = "scope"
type            = "string"
mcp_description = "Filter export to a scope selector. Pass an exact scope path or the reserved value 'cwd_inferred'. Omit to export everything."
cli_help        = "Filter export to scope selector: exact path or reserved value cwd_inferred"
cli_flag        = "--scope"

[[tools.cx_export.params]]
name            = "format"
type            = "string"
enum            = ["json"]
mcp_description = "Export format. Currently only 'json' is supported. Default: 'json'."
cli_help        = "Export format (currently only json). Default: json"
cli_flag        = "--format"
