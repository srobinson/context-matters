# Single source of truth for all tool documentation.
# build.rs reads this file and generates:
#   src/mcp/generated_schema.rs  — MCP tool list JSON
#   src/cli/generated_help.rs    — CLI help string constants
#   templates/SKILL.md           — Claude Code skill documentation

[skill]
workflow = """
## Context Management Workflow

1. **Recall** — `cx_recall(query: "topic")` — priority context for one known scope by walking ancestors.
2. **Search** — `cx_search(query: "topic", scope: {"kind":"all"})` — content search across wide or unknown scopes.
3. **Store** — `cx_store(title, body, kind)` — persist facts, decisions, preferences, lessons.
4. **Deposit** — `cx_deposit(exchanges)` — batch-store conversation exchanges for future reference.
5. **Browse** — `cx_browse(kind: "decision")` — filtered inventory with pagination.
6. **Get** — `cx_get(ids)` — fetch full content for specific entries (two-phase retrieval).
7. **Update** — `cx_update(id, title: "new")` — partial update of existing entries.
8. **Forget** — `cx_forget(ids)` — soft-delete entries no longer relevant.

### Task Workflow

```
1. Receive task from user or orchestrator
2. cx_recall(query: "summary of task", scope: {"kind":"path","path":"global/project:helioy/repo:nancyr"})
   → retrieve priority context for THIS known scope and its ancestors
3. Work on the task
4. cx_store(title: "...", body: "...", kind: "decision", scope: "global/project:helioy")
   → persist reusable knowledge when discovered
5. cx_deposit(exchanges: [...], summary: "...")
   → preserve conversation at session end for continuity
```

Key: use cx_recall for a single known scope. Use cx_search when the right scope is unknown, broad, or cross-repo.
When the user corrects you, store it immediately as kind: "feedback" (highest recall priority).

### Scope Model

Scopes form a hierarchy: global > project > repo > session.
Context at broader scopes is visible at narrower scopes (ancestor walk).

```
global                                          — cross-project knowledge
global/project:helioy                           — project-level decisions
global/project:helioy/repo:nancyr               — codebase-specific facts
global/project:helioy/repo:nancyr/session:abc   — ephemeral task context
```

Public requests select scope through the `scope` field. Structured selectors:

```
{ "scope": {"kind":"path","path":"global"} }       exact scope for recall or search
{ "scope": {"kind":"cwd_inferred","cwd":"/repo"} } structured cwd inference
{ "scope": {"kind":"subtree","path":"global/project:helioy"} } subtree match
{ "scope": {"kind":"set","paths":["global","global/project:helioy"]} } explicit set
{ "scope": {"kind":"all"} }                        no scope filter
```

`cx_recall` accepts only `path` and `cwd_inferred` selectors. Use `cx_search` for `subtree`, `set`, and `all`.
For cwd based browse resolution, call `cx_browse(scope: {"kind":"cwd_inferred","cwd":"/path/to/repo"})`. `cwd_inferred` resolves linked git worktrees to the source repository identity.

Persisted entries, export rows, and response payloads include a `scope_path` field that identifies the exact stored scope of each row.

### Two-Phase Retrieval

cx_recall, cx_search, and cx_browse return metadata + snippet (first 200 chars of body).
Use cx_get with returned IDs to fetch full body content.
This keeps initial responses compact while allowing selective deep reads.
"""

# Tool order matches the MCP tools/list response order — do not reorder.

[tools.cx_recall]
cli_name        = "recall"
mcp_description = "Recall priority context for a single known scope by walking that scope and its ancestors. Call after receiving a task with a summary of what you are working on. With a query, uses FTS5 inside the ancestor walk. Without a query, returns all entries visible at the target scope. Use cx_search when you need content search across subtree, set, or all scopes. Returns metadata + snippet for two-phase retrieval; use cx_get for full body. IMPORTANT: The query uses FTS5 with implicit AND between words. Use 1-3 keywords, not full sentences. More words = fewer results. Examples: 'auth migration' (good), 'how does the authentication migration work' (too many words, likely 0 results). Use OR for alternatives: 'auth OR authentication'. Use prefix matching: 'migrat*'."
cli_about       = "Recall priority context for a single known scope.\n\nWalks the target scope and its ancestors. Use search for subtree, set, or all-scope content search."
# JSON Schema mirrors `WebRecallView` (crates/cm-capabilities/src/projection/web_view.rs:272).
# `query`, `tier`, `score` are `skip_serializing_if = Option::is_none` and omitted from the
# JSON when absent — they are listed in `properties` but not in `required`.
output_schema   = '''
{
  "type": "object",
  "description": "Recall response: query header, ranked rows, and capability advisories.",
  "required": ["header", "entries", "advisories"],
  "properties": {
    "header": {
      "type": "object",
      "description": "Per-response query envelope.",
      "required": ["routing", "candidates", "returned", "scope_chain", "scope_hits", "kinds_histogram", "tags_histogram", "tokens"],
      "properties": {
        "query": {"type": "string", "description": "Free-text query the caller supplied. Omitted when the recall was tag/scope-only."},
        "routing": {"type": "string", "description": "Routing branch chosen by the recall pipeline (search, browse_fallback, scope_resolve, tag_scope_walk)."},
        "tier": {"type": "string", "description": "Search tier the cascade settled on (none, exact, prefix, split_or). Omitted on non-search routings."},
        "candidates": {"type": "integer", "minimum": 0, "description": "Total candidates considered before token-budget trimming."},
        "returned": {"type": "integer", "minimum": 0, "description": "Number of rows in `entries` after token-budget trimming."},
        "scope_chain": {"type": "array", "items": {"type": "string"}, "description": "Scope path plus ancestors walked, in order."},
        "scope_hits": {"type": "object", "additionalProperties": {"type": "integer", "minimum": 0}, "description": "Per-scope hit counts in `scope_chain`."},
        "kinds_histogram": {"type": "object", "additionalProperties": {"type": "integer", "minimum": 0}, "description": "Per-kind counts across the returned rows."},
        "tags_histogram": {"type": "object", "additionalProperties": {"type": "integer", "minimum": 0}, "description": "Per-tag counts across the returned rows."},
        "tokens": {"type": "integer", "minimum": 0, "description": "Estimated token total of the rendered response."}
      }
    },
    "entries": {
      "type": "array",
      "description": "Ranked recall rows. Order is significant.",
      "items": {
        "type": "object",
        "required": ["id", "title", "snippet", "age", "scope", "kind", "tags"],
        "properties": {
          "id": {"type": "string", "format": "uuid", "description": "Full UUID v7."},
          "score": {"type": "number", "description": "Normalised relevance score in [0, 1] on Search routing. Omitted on non-search routings."},
          "title": {"type": "string"},
          "snippet": {"type": "string", "description": "Smart snippet of the entry body, with matched query terms bracketed when applicable."},
          "age": {"type": "string", "description": "Relative age string (e.g. \"2h\", \"6d\")."},
          "scope": {"type": "string"},
          "kind": {"type": "string", "enum": ["fact", "decision", "preference", "lesson", "reference", "feedback", "pattern", "observation"]},
          "tags": {"type": "array", "items": {"type": "string"}}
        }
      }
    },
    "advisories": {
      "type": "array",
      "description": "Capability advisory messages returned with the recall result.",
      "items": {"type": "string"}
    }
  }
}
'''

[[tools.cx_recall.params]]
name            = "query"
type            = "string"
mcp_description = "FTS5 search query. Use 1-3 keywords (implicit AND); keywords match, full sentences match nothing. Supports prefix queries (rust*), phrase queries (\"scope path\"), and boolean operators (AND, OR, NOT). Use OR between synonyms: 'auth OR authentication'. Omit to return all entries at the target scope via ancestor walk."
cli_help        = "FTS5 search query (prefix: rust*, phrase: \"scope path\", boolean: AND/OR/NOT)"
cli_flag        = "query"

[[tools.cx_recall.params]]
name            = "scope"
type            = "object"
mcp_description = "Structured ScopeSelector object for recall. Accepted variants: {\"kind\":\"path\",\"path\":\"global/project:helioy\"} or {\"kind\":\"cwd_inferred\",\"cwd\":\"/path/to/repo\"}. cx_recall rejects subtree, set, and all selectors; use cx_search for broad scope queries. Default: {\"kind\":\"path\",\"path\":\"global\"}. Plain strings are not accepted by MCP."
cli_help        = "Scope selector: structured path/cwd_inferred JSON; reserved value cwd_inferred means cwd inference. Default: global"
cli_flag        = "--scope"

[[tools.cx_recall.params]]
name            = "kinds"
type            = "array"
items_type      = "string"
mcp_description = "Filter to specific entry kinds (OR logic). Valid values: fact, decision, preference, lesson, reference, feedback, pattern, observation."
cli_help        = "Filter by entry kind (comma-separated). Valid: fact, decision, preference, lesson, reference, feedback, pattern, observation"
cli_flag        = "--kinds"

[[tools.cx_recall.params]]
name            = "tags"
type            = "array"
items_type      = "string"
mcp_description = "Filter to entries with any of these tags (OR logic). Pass a JSON array: [\"tag1\", \"tag2\"]."
cli_help        = "Filter by tag (comma-separated, OR logic)"
cli_flag        = "--tags"

[[tools.cx_recall.params]]
name            = "limit"
type            = "integer"
mcp_description = "Maximum number of entries to return. Default: 20, max: 200."
cli_help        = "Maximum number of results (default: 20, max: 200)"
cli_flag        = "--limit"

[[tools.cx_recall.params]]
name            = "max_tokens"
type            = "integer"
mcp_description = "Maximum token budget for the response. Results are trimmed to fit within this budget, prioritizing higher-relevance entries. Uses ~4 chars/token estimation."
cli_help        = "Maximum token budget for response (trims results to fit)"
cli_flag        = "--max-tokens"

[tools.cx_search]
cli_name        = "search"
mcp_description = "Search cm entries by content across scopes. Returns FTS5 BM25-ranked hits. Use cx_search when you have a query and want results from multiple scopes, an unknown scope, or all scopes. Use cx_recall when you want priority-ordered context for a single known scope, walking ancestors. Recall is sharper but narrower."
cli_about       = "Search cm entries by content across scopes.\n\nReturns FTS5 BM25-ranked hits. Use for multiple scopes, unknown scope, subtree, set, or all-scope searches."
output_schema   = '''
{
  "type": "object",
  "description": "Search response: content-ranked rows and cursor pagination metadata.",
  "required": ["header", "entries"],
  "properties": {
    "header": {
      "type": "object",
      "description": "Search query envelope.",
      "required": ["query", "returned", "scope_hits", "kinds_histogram", "tags_histogram", "tokens"],
      "properties": {
        "query": {"type": "string", "description": "FTS5 query supplied by the caller."},
        "returned": {"type": "integer", "minimum": 0, "description": "Number of rows in this page."},
        "next_cursor": {"type": "string", "description": "Opaque cursor for the next page. Omitted when there are no more rows."},
        "scope_hits": {"type": "object", "additionalProperties": {"type": "integer", "minimum": 0}, "description": "Per-scope hit counts for this page."},
        "kinds_histogram": {"type": "object", "additionalProperties": {"type": "integer", "minimum": 0}, "description": "Per-kind counts for this page."},
        "tags_histogram": {"type": "object", "additionalProperties": {"type": "integer", "minimum": 0}, "description": "Per-tag counts for this page."},
        "tokens": {"type": "integer", "minimum": 0, "description": "Estimated token total of the full bodies in this page."}
      }
    },
    "entries": {
      "type": "array",
      "description": "FTS5-ranked search rows. Order is significant.",
      "items": {
        "type": "object",
        "required": ["id", "score", "title", "snippet", "age", "scope", "kind", "tags"],
        "properties": {
          "id": {"type": "string", "format": "uuid", "description": "Full UUID v7."},
          "score": {"type": "number", "description": "Normalised relevance score in [0, 1]."},
          "title": {"type": "string"},
          "snippet": {"type": "string", "description": "Smart snippet of the entry body, with matched query terms bracketed."},
          "age": {"type": "string", "description": "Relative age string."},
          "scope": {"type": "string"},
          "kind": {"type": "string", "enum": ["fact", "decision", "preference", "lesson", "reference", "feedback", "pattern", "observation"]},
          "tags": {"type": "array", "items": {"type": "string"}}
        }
      }
    }
  }
}
'''

[[tools.cx_search.params]]
name            = "query"
type            = "string"
required        = true
mcp_description = "Required FTS5 search query. Use 1-3 keywords. Supports prefix queries (rust*), phrase queries (\"scope path\"), and boolean operators (AND, OR, NOT)."
cli_help        = "Required FTS5 search query"
cli_flag        = "query"

[[tools.cx_search.params]]
name            = "scope"
type            = "object"
required        = true
mcp_description = "Structured ScopeSelector JSON. Accepted variants: {\"kind\":\"path\",\"path\":\"global/project:helioy\"}, {\"kind\":\"cwd_inferred\",\"cwd\":\"/path/to/repo\"}, {\"kind\":\"subtree\",\"path\":\"global/project:helioy\"}, {\"kind\":\"set\",\"paths\":[\"global\",\"global/project:helioy\"]}, or {\"kind\":\"all\"}. Plain strings and top-level cwd are not accepted."
cli_help        = "Scope selector: exact path, reserved value cwd_inferred, or structured subtree/set/all JSON"
cli_flag        = "--scope"

[[tools.cx_search.params]]
name            = "kinds"
type            = "array"
items_type      = "string"
mcp_description = "Filter to specific entry kinds (OR logic). Valid values: fact, decision, preference, lesson, reference, feedback, pattern, observation."
cli_help        = "Filter by entry kind"
cli_flag        = "--kinds"

[[tools.cx_search.params]]
name            = "tags"
type            = "array"
items_type      = "string"
mcp_description = "Filter to entries with any of these tags (OR logic). Pass a JSON array: [\"tag1\", \"tag2\"]."
cli_help        = "Filter by tag"
cli_flag        = "--tags"

[[tools.cx_search.params]]
name            = "limit"
type            = "integer"
mcp_description = "Maximum number of entries to return. Default: 20, max: 200."
cli_help        = "Maximum number of results"
cli_flag        = "--limit"

[[tools.cx_search.params]]
name            = "cursor"
type            = "string"
mcp_description = "Opaque pagination cursor from a previous cx_search response. Pass next_cursor to fetch the next page."
cli_help        = "Pagination cursor from previous cx_search response"
cli_flag        = "--cursor"

[tools.cx_store]
cli_name        = "store"
mcp_description = "Store a single context entry with structured metadata. Scopes are auto-created if they do not exist. Use 'supersedes' to replace an existing entry (soft-deletes the old one). Returns the new entry ID and content hash."
cli_about       = "Store a context entry.\n\nCreates a new entry with title, body, kind, and optional metadata. Scope chain is auto-created if missing. Use --supersedes to replace an existing entry."

[[tools.cx_store.params]]
name            = "title"
type            = "string"
required        = true
mcp_description = "Short summary of the entry. Displayed in search results and browse listings."
cli_help        = "Entry title (short summary)"
cli_flag        = "title"

[[tools.cx_store.params]]
name            = "body"
type            = "string"
required        = true
mcp_description = "Full content body in markdown."
cli_help        = "Entry body content (markdown)"
cli_flag        = "body"

[[tools.cx_store.params]]
name            = "kind"
type            = "string"
required        = true
enum            = ["fact", "decision", "preference", "lesson", "reference", "feedback", "pattern", "observation"]
mcp_description = "Entry classification. Determines recall priority. fact: verified information. decision: architectural choice with rationale. preference: user/project preference. lesson: learned from experience. reference: pointer to external material. feedback: user correction (highest priority). pattern: recurring code/process pattern. observation: general-purpose note."
cli_help        = "Entry kind: fact, decision, preference, lesson, reference, feedback, pattern, observation"
cli_flag        = "--kind"

[[tools.cx_store.params]]
name            = "scope"
type            = "string"
mcp_description = "Target scope selector. Pass an exact scope path or the reserved value 'cwd_inferred'. Exact scope chains are created if missing. Default: 'global'."
cli_help        = "Target scope selector: exact path or reserved value cwd_inferred. Default: global"
cli_flag        = "--scope"

[[tools.cx_store.params]]
name            = "created_by"
type            = "string"
mcp_description = "Attribution string. Format: 'source_type:identifier'. Examples: 'human:stuart', 'agent:claude-code', 'system:consolidation'. Default: 'agent:claude-code'."
cli_help        = "Attribution (format: source_type:identifier). Default: agent:claude-code"
cli_flag        = "--created-by"

[[tools.cx_store.params]]
name            = "tags"
type            = "array"
items_type      = "string"
mcp_description = "Freeform tags for categorization and filtering. Pass a JSON array: [\"tag1\", \"tag2\"]."
cli_help        = "Tags for categorization (comma-separated)"
cli_flag        = "--tags"

[[tools.cx_store.params]]
name            = "confidence"
type            = "string"
enum            = ["high", "medium", "low"]
mcp_description = "Confidence level. Affects recall priority ordering: high entries surface before low entries at the same scope level."
cli_help        = "Confidence level: high, medium, low"
cli_flag        = "--confidence"

[[tools.cx_store.params]]
name            = "source"
type            = "string"
mcp_description = "Source URL or file path for reference entries."
cli_help        = "Source URL or path (provenance)"
cli_flag        = "--source"

[[tools.cx_store.params]]
name            = "expires_at"
type            = "string"
mcp_description = "ISO 8601 expiry timestamp. After this time the entry is considered stale. Stored but not enforced by the storage layer."
cli_help        = "Expiry timestamp (ISO 8601). Entry is considered stale after this time"
cli_flag        = "--expires-at"

[[tools.cx_store.params]]
name            = "priority"
type            = "integer"
mcp_description = "Numeric priority for manual ordering. Higher values surface first in recall results."
cli_help        = "Numeric priority (higher = surfaces first)"
cli_flag        = "--priority"

[[tools.cx_store.params]]
name            = "supersedes"
type            = "string"
mcp_description = "ID of an existing entry that this new entry replaces. The old entry is soft-deleted and linked via a 'supersedes' relation."
cli_help        = "ID of entry to supersede (soft-deletes old, creates replacement)"
cli_flag        = "--supersedes"

[tools.cx_deposit]
cli_name        = "deposit"
mcp_description = "Batch-store conversation exchanges for future context. Each exchange (user/assistant pair) becomes an observation entry. Optional summary creates a linked observation with 'elaborates' relations to each exchange. All entries created in a single transaction. Maximum 50 exchanges per deposit."
cli_about       = "Batch-store conversation exchanges.\n\nEach exchange becomes an observation entry. Provide an optional summary to create a linked summary entry."

[[tools.cx_deposit.params]]
name            = "exchanges"
type            = "array"
required        = true
mcp_description = "Conversation exchanges to store. Each exchange has 'user' (user message), 'assistant' (assistant response), and optional 'title' (explicit title, max 80 bytes; auto-generated from user message snippet if omitted). Maximum 50 exchanges per deposit."
cli_help        = "JSON array of {user, assistant, title?} exchange objects"
cli_flag        = "exchanges"

[[tools.cx_deposit.params]]
name            = "summary"
type            = "string"
mcp_description = "Optional summary of the conversation. Stored as a separate observation entry linked to each exchange via 'elaborates' relations."
cli_help        = "Optional conversation summary (linked to exchanges)"
cli_flag        = "--summary"

[[tools.cx_deposit.params]]
name            = "scope"
type            = "string"
mcp_description = "Target scope selector. Pass an exact scope path or the reserved value 'cwd_inferred'. Exact scope chains are created if missing. Default: 'global'."
cli_help        = "Target scope selector: exact path or reserved value cwd_inferred. Default: global"
cli_flag        = "--scope"

[[tools.cx_deposit.params]]
name            = "created_by"
type            = "string"
mcp_description = "Attribution string. Default: 'agent:claude-code'."
cli_help        = "Attribution (format: source_type:identifier). Default: agent:claude-code"
cli_flag        = "--created-by"

[tools.cx_browse]
cli_name        = "browse"
mcp_description = "List entries with filtering and cursor-based pagination. For inventory and exploration, not semantic search. Defaults to cwd_inferred when scope is omitted. Returns metadata + snippet (two-phase retrieval). Filters combine with AND semantics. Results ordered by updated_at DESC."
cli_about       = "Browse entries with filtering and pagination.\n\nFor inventory and exploration. Returns metadata and snippet, not full body. Use cx_get for full content."
# JSON Schema mirrors `WebBrowseView` (crates/cm-capabilities/src/projection/web_view.rs:112).
# Header `scope`, `kind`, `created_by`, top-level `resolution`, row `scope`, and
# row `kind` are `skip_serializing_if = Option::is_none`. `next_cursor` is present
# only when more pages remain.
output_schema   = '''
{
  "type": "object",
  "description": "Browse response: filtered inventory header, optional advisory, optional scope resolution metadata, rows, and pagination tail.",
  "required": ["header", "entries", "has_more"],
  "properties": {
    "header": {
      "type": "object",
      "description": "Per-response result header with hoisted uniform columns and histograms.",
      "required": ["sort_used", "total", "returned", "kinds_histogram", "tags_histogram"],
      "properties": {
        "sort_used": {"type": "string", "description": "Sort order the browse pipeline applied (e.g. updated_at desc)."},
        "total": {"type": "integer", "minimum": 0, "description": "Total matching rows in the store before pagination."},
        "returned": {"type": "integer", "minimum": 0, "description": "Number of rows in `entries` on this page."},
        "scope": {"type": "string", "description": "Uniform scope path hoisted from all returned rows. Omitted when rows vary or the response is empty."},
        "kind": {"type": "string", "description": "Uniform entry kind hoisted from all returned rows. Omitted when rows vary or the response is empty."},
        "created_by": {"type": "string", "description": "Uniform creator attribution hoisted from all returned rows. Omitted when rows vary or the response is empty."},
        "kinds_histogram": {"type": "object", "additionalProperties": {"type": "integer", "minimum": 0}, "description": "Per-kind counts across the returned rows."},
        "tags_histogram": {"type": "object", "additionalProperties": {"type": "integer", "minimum": 0}, "description": "Per-tag counts across the returned rows."}
      }
    },
    "advisory": {"type": "string", "description": "Capability advisory emitted when browse applied a default."},
    "resolution": {
      "type": "object",
      "description": "Scope resolution metadata when smart browse inference was requested.",
      "required": ["requested_scope", "resolved_scope", "scope_mode", "confidence", "candidates", "signals"],
      "properties": {
        "requested_scope": {"type": "string", "description": "Scope input supplied by the caller, usually cwd_inferred."},
        "resolved_scope": {"type": "string", "description": "Existing exact scope path used for the browse query."},
        "scope_mode": {"type": "string", "enum": ["resolved"], "description": "Scope resolution mode applied."},
        "confidence": {"type": "string", "enum": ["high", "medium", "low", "very_low"], "description": "Resolver confidence in the selected scope."},
        "candidates": {
          "type": "array",
          "description": "Candidate scopes considered by the resolver, sorted best first.",
          "items": {
            "type": "object",
            "required": ["scope", "score", "matched"],
            "properties": {
              "scope": {"type": "string", "description": "Candidate scope path."},
              "score": {"type": "integer", "description": "Deterministic resolver score."},
              "matched": {"type": "array", "items": {"type": "string"}, "description": "Signals that contributed to this candidate score."}
            }
          }
        },
        "signals": {"type": "array", "items": {"type": "string"}, "description": "Human-readable explanation of the selected scope."}
      }
    },
    "entries": {
      "type": "array",
      "description": "Browse rows on this page. Order is significant (sort_used governs).",
      "items": {
        "type": "object",
        "required": ["id", "title", "snippet", "age", "tags"],
        "properties": {
          "id": {"type": "string", "format": "uuid", "description": "Full UUID v7."},
          "title": {"type": "string"},
          "snippet": {"type": "string", "description": "Smart snippet of the entry body."},
          "age": {"type": "string", "description": "Relative age string (e.g. \"2h\", \"6d\")."},
          "scope": {"type": "string", "description": "Row scope path. Omitted when the header hoists a uniform scope."},
          "kind": {"type": "string", "enum": ["fact", "decision", "preference", "lesson", "reference", "feedback", "pattern", "observation"], "description": "Entry kind. Omitted when the header hoists a uniform kind."},
          "tags": {"type": "array", "items": {"type": "string"}}
        }
      }
    },
    "next_cursor": {"type": "string", "description": "Opaque cursor to feed back as `cursor` on the next page. Omitted when `has_more` is false."},
    "has_more": {"type": "boolean", "description": "True when another page is available via `next_cursor`."}
  }
}
'''

[[tools.cx_browse.params]]
name            = "scope"
type            = "object"
mcp_description = "Structured ScopeSelector object for browse. Accepted variants: {\"kind\":\"path\",\"path\":\"global/project:helioy\"}, {\"kind\":\"cwd_inferred\",\"cwd\":\"/path/to/repo\"}, {\"kind\":\"subtree\",\"path\":\"global/project:helioy\"}, {\"kind\":\"set\",\"paths\":[\"global\",\"global/project:helioy\"]}, or {\"kind\":\"all\"}. Defaults to {\"kind\":\"cwd_inferred\"} when scope is omitted. Plain strings and top-level cwd are not accepted by MCP."
cli_help        = "Preferred scope: reserved value cwd_inferred, exact path, or structured subtree/set/all selector"
cli_flag        = "--scope"

[[tools.cx_browse.params]]
name            = "include_resolution"
type            = "boolean"
mcp_description = "Include scope resolution metadata in the response. Defaults to true when scope=\"cwd_inferred\"."
cli_help        = "Include scope resolution metadata"
cli_flag        = "--include-resolution"

[[tools.cx_browse.params]]
name            = "kind"
type            = "string"
enum            = ["fact", "decision", "preference", "lesson", "reference", "feedback", "pattern", "observation"]
mcp_description = "Filter by entry kind."
cli_help        = "Filter by kind: fact, decision, preference, lesson, reference, feedback, pattern, observation"
cli_flag        = "--kind"

[[tools.cx_browse.params]]
name            = "tag"
type            = "string"
mcp_description = "Filter by tag. Entries must have at least one matching tag."
cli_help        = "Filter by tag (entries must have this tag)"
cli_flag        = "--tag"

[[tools.cx_browse.params]]
name            = "created_by"
type            = "string"
mcp_description = "Filter by creator attribution string."
cli_help        = "Filter by creator (e.g. agent:claude-code, human:stuart)"
cli_flag        = "--created-by"

[[tools.cx_browse.params]]
name            = "include_superseded"
type            = "boolean"
mcp_description = "Include superseded (inactive) entries in results. Default: false."
cli_help        = "Include superseded/forgotten entries (default: false)"
cli_flag        = "--include-superseded"

[[tools.cx_browse.params]]
name            = "limit"
type            = "integer"
mcp_description = "Maximum entries per page. Default: 20, max: 200."
cli_help        = "Entries per page (default: 20, max: 200)"
cli_flag        = "--limit"

[[tools.cx_browse.params]]
name            = "cursor"
type            = "string"
mcp_description = "Opaque pagination cursor from a previous cx_browse response. Pass next_cursor to fetch the next page."
cli_help        = "Pagination cursor from previous response"
