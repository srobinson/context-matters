[profile.default]
# Fail fast: stop on first failure during local development
fail-fast = true
# Retry flaky tests once
retries = 0
# Per-test timeout
slow-timeout = { period = "30s", terminate-after = 2 }

[profile.ci]
# CI: run all tests even if some fail
fail-fast = false
# Retry flaky tests once in CI
retries = 1
# Stricter timeout for CI
slow-timeout = { period = "60s", terminate-after = 2 }
