name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    # PR: always run. Push to main: only on direct pushes (skip merged PRs and release-please).
    if: >-
      github.event_name == 'pull_request'
      || (github.event.head_commit.committer.username != 'web-flow'
          && !contains(github.event.head_commit.message, 'chore(main): release'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Audit
        run: |
          cargo install cargo-audit --locked --quiet
          cargo audit

      - name: Check generated docs are in sync with tools.toml
        run: |
          git diff --exit-code \
            crates/cm-cli/src/mcp/generated_schema.rs \
            crates/cm-cli/src/cli/generated_help.rs \
            crates/cm-cli/templates/SKILL.md || \
            (echo "ERROR: Generated docs are out of sync with tools.toml. Run 'cargo build -p cm-cli' and commit the result." && exit 1)
